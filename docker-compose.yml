services:
  bot:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Point at the host's Next.js frontend from inside the container.
      # Override this in .env if your chat API lives elsewhere.
      CHAT_API_URL: ${CHAT_API_URL:-http://host.docker.internal:3000/api/chat}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
