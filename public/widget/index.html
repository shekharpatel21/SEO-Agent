<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SEO Keyword Agent</title>
<style>
  :root { --accent:#4f46e5; --bg:#0f172a; --fg:#e2e8f0; --muted:#94a3b8; --card:#1e293b; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; flex-direction: column;
  }
  header { padding: 14px 18px; background: #020617; border-bottom: 1px solid #1e293b; }
  header h1 { margin: 0; font-size: 15px; letter-spacing: .02em; }
  header small { color: var(--muted); font-weight: 400; }
  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; }
  .msg.bot  { align-self: flex-start; background: var(--card); border: 1px solid #334155; }
  .msg.bot.status { color: var(--muted); font-style: italic; }
  .msg.bot.error  { border-color: #ef4444; color: #fecaca; }
  .pdf-link { display: inline-flex; gap: 6px; margin-top: 8px; font-size: 13px; color: var(--accent); text-decoration: none; }
  .pdf-link:hover { text-decoration: underline; }
  form { display: flex; gap: 8px; padding: 12px; background: #020617; border-top: 1px solid #1e293b; }
  input[type=text] { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: var(--card); color: var(--fg); font-size: 14px; }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  button { padding: 10px 16px; border-radius: 8px; border: 0; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
  button:disabled { opacity: .6; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>SEO Keyword Agent <small>— ask a question, get a report + PDF</small></h1>
</header>
<div id="log"></div>
<form id="f">
  <input id="q" type="text" placeholder="e.g. 10 keywords for AI agent automation" autocomplete="off" autofocus />
  <button id="send" type="submit">Send</button>
</form>
<script>
  const ENDPOINT = (window.SEO_WIDGET_ENDPOINT || "/api/message");
  const log = document.getElementById("log");
  const form = document.getElementById("f");
  const input = document.getElementById("q");
  const btn = document.getElementById("send");

  function addMsg(role, text, cls = "") {
    const el = document.createElement("div");
    el.className = `msg ${role} ${cls}`.trim();
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function attachPdf(container, base64, filename) {
    try {
      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename || "seo-report.pdf";
      a.className = "pdf-link";
      a.textContent = "📄 Download PDF";
      container.appendChild(document.createElement("br"));
      container.appendChild(a);
    } catch (e) { console.error("pdf decode failed", e); }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const query = input.value.trim();
    if (!query) return;
    input.value = "";
    btn.disabled = true;
    addMsg("user", query);
    const status = addMsg("bot", "⏳ Working on it…", "status");

    try {
      const res = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      const data = await res.json();
      if (!data.success) {
        status.className = "msg bot error";
        status.textContent = `⚠️ ${data.error || "Something went wrong."}`;
      } else {
        status.className = "msg bot";
        status.textContent = data.report;
        if (data.pdf_base64) attachPdf(status, data.pdf_base64, data.filename);
      }
    } catch (err) {
      status.className = "msg bot error";
      status.textContent = `⚠️ Network error: ${err.message}`;
    } finally {
      btn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
